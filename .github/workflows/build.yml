name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      
      - name: Restore NuGet packages
        run: nuget restore ARZVPRewrite.sln
      
      - name: Build the project
        run: msbuild ARZVPRewrite.sln /p:Configuration=Release /p:Platform="Any CPU"
      
      - name: Copy DLL to Installer\DLL
        run: |
          if not exist "Installer\DLL" mkdir "Installer\DLL"
          copy "ARZVPRewrite\bin\Release\ARZVPRewrite.dll" "Installer\DLL\"
        shell: cmd
      
      - name: Compile Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.8
        with:
          path: Installer\ARZVP.iss
          options: /O+
      
      - name: Upload installer as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ARZVP-Setup
          path: Installer\Output\*.exe
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: Installer\Output\*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}